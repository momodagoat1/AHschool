<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Video Player</title>
<script src="https://cdn.jsdelivr.net/npm/p5@1.11.1/lib/p5.min.js"></script>
<style>
html,body{margin:0;background:#111;color:#fff;font-family:Arial;overflow:hidden}
#controls{position:absolute;left:0;right:0;bottom:0;background:#222;padding:10px;display:flex;gap:8px;align-items:center}
#top{position:absolute;top:10px;left:10px;z-index:10}
button,input{padding:8px}
#time{min-width:90px}
</style></head><body>
<div id="top">
<button onclick="loadVideo(boiled)">The Boiled One</button>
<button onclick="loadVideo(bath)">The Boy and the Bath</button>
</div>
<div id="controls">
<button onclick="toggle()">▶️/⏸</button>
<button onclick="seek(-10)">⏪10s</button>
<button onclick="seek(10)">10s⏩</button>
<input id="bar" type="range" min="0" max="100" value="0" style="flex:1">
<span id="time">0:00 / 0:00</span>
<input id="vol" type="range" min="0" max="1" step="0.01" value="1">
<button onclick="fullscreen()">⛶</button>
</div>
<script>
let boiled,bath,current=null,bar,timeTxt,vol;
function setup(){
createCanvas(windowWidth,windowHeight);
boiled=createVideo('boiled_one.mp4');boiled.hide();
bath=createVideo('boy_bath.mp4');bath.hide();
bar=document.getElementById('bar');
timeTxt=document.getElementById('time');
vol=document.getElementById('vol');
bar.oninput=()=>{if(current)current.time(current.duration()*bar.value/100);}
vol.oninput=()=>{if(boiled)boiled.volume(vol.value);if(bath)bath.volume(vol.value);}
}
function draw(){
background(0);
if(current){
image(current,0,0,width,height);
if(current.duration()>0){
bar.value=current.time()/current.duration()*100;
timeTxt.textContent=f(current.time())+" / "+f(current.duration());
}}
}
function loadVideo(v){if(current&&current!==v)current.stop();current=v;v.loop();}
function toggle(){if(!current)return;current.elt.paused?current.play():current.pause();}
function seek(s){if(current)current.time(Math.max(0,Math.min(current.duration(),current.time()+s)));}
function fullscreen(){let e=document.documentElement;document.fullscreenElement?document.exitFullscreen():e.requestFullscreen();}
function f(t){let m=Math.floor(t/60),s=Math.floor(t%60);return m+":"+(s<10?"0":"")+s;}
function windowResized(){resizeCanvas(windowWidth,windowHeight);}
</script></body></html>
